<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Búsqueda de Usuario - Gestión de Tareas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Encabezado -->
    <header class="header">
      <h1 class="header__title">Gestión de Tareas</h1>
      <p class="header__subtitle">Consulta de usuarios y sus tareas</p>
    </header>

    <!-- Formulario de búsqueda -->
    <section class="form-section">
      <div class="card">
        <h2 class="card__title">Buscar Usuario</h2>
        <form id="searchForm" class="form" novalidate>
          <div class="form__group">
            <label for="documento" class="form__label">Documento de identidad</label>
            <input type="text" id="documento" class="form__input" placeholder="Ingresa el documento">
            <span class="form__error" id="documentoError"></span>
          </div>
          <button type="submit" class="btn btn--primary">Buscar</button>
        </form>
      </div>
    </section>

    <!-- Área de resultados -->
    <section class="results-section">
      <h2 class="results-title">Resultados</h2>
      <div id="resultadoUsuario" class="results-container">
        <!-- Aquí se insertará la card con los datos del usuario -->
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p class="footer__text">Ejercicio DOM + API | SENA</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
